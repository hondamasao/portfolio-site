<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masao Honda</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #111;
  color: #f5f5f5;
  line-height: 1.6;
}

header {
  padding: 120px 20px 60px;
  text-align: center;
}

h1 {
  margin: 0;
  font-family: 'Playfair Display', serif;
  font-weight: 500;
  font-size: 32px;
  letter-spacing: 0.5px;
}
header p {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.6;
  letter-spacing: 0.5px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  padding: 40px 8vw;
  max-width: 1400px;
  margin: 0 auto;
}

.gallery img {
  width: 100%;
  display: block;
  cursor: pointer;
  transition: transform 0.25s ease, opacity 0.25s ease;
}

.gallery img {
  aspect-ratio: 4 / 5;
  object-fit: cover;
}

.gallery img:hover {
  transform: scale(1.02);
  opacity: 0.9;
}

.modal button {
  margin-top: 20px;
  padding: 12px 24px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

.modal {
  opacity: 0;
  visibility: hidden;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.3s ease;
}

.modal.active {
  opacity: 1;
  visibility: visible;
}

.modal img {
  max-width: 90%;
  max-height: 85vh;
  transform: scale(0.96);
  transition: transform 0.3s ease;
}

.modal.active img {
  transform: scale(1);
}

.close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 32px;
  cursor: pointer;
}

.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  cursor: pointer;
  padding: 20px;
  user-select: none;
}

.prev { left: 20px; }
.next { right: 20px; }

.nav:hover, .close:hover {
  opacity: 0.7;
}

footer {
  text-align: center;
  padding: 100px 20px 60px;
  font-size: 11px;
  opacity: 0.35;
  letter-spacing: 1px;
  text-transform: uppercase;
}

body.fade-start {
  opacity: 0;
  transition: opacity 1s ease;
}

body.fade-in {
  opacity: 1;
}
</style>
</head>

<body class="fade-start">

<header>
  <h1>Masao Honda</h1>
  <p>Selected Works, 2022-2025</p>
  <p><a href="about.html" style="color: inherit; text-decoration: none; opacity: 0.6;">About</a></p>
</header>

<section class="gallery">
  <img loading="lazy" src="images/thumbs/01.jpg" onclick="openModal('images/fulls/01.jpg')">
  <img loading="lazy" src="images/thumbs/02.jpg" onclick="openModal('images/fulls/02.jpg')">
  <img loading="lazy" src="images/thumbs/07.jpg" onclick="openModal('images/fulls/07.jpg')">
  <img loading="lazy" src="images/thumbs/10.jpg" onclick="openModal('images/fulls/10.jpg')">
  <img loading="lazy" src="images/thumbs/11.jpg" onclick="openModal('images/fulls/11.jpg')">
  <img loading="lazy" src="images/thumbs/12.jpg" onclick="openModal('images/fulls/12.jpg')">
  <img loading="lazy" src="images/thumbs/14.jpg" onclick="openModal('images/fulls/14.jpg')">
  <img loading="lazy" src="images/thumbs/18.jpg" onclick="openModal('images/fulls/18.jpg')">
  <img loading="lazy" src="images/thumbs/19.jpg" onclick="openModal('images/fulls/19.jpg')">
  <img loading="lazy" src="images/thumbs/22.jpg" onclick="openModal('images/fulls/22.jpg')">
  <img loading="lazy" src="images/thumbs/23.jpg" onclick="openModal('images/fulls/23.jpg')">
  <img loading="lazy" src="images/thumbs/24.jpg" onclick="openModal('images/fulls/24.jpg')">
</section>

<div class="modal" id="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <span class="nav prev" onclick="changeImage(-1)">&#10094;</span>
  <img id="modal-img">
  <span class="nav next" onclick="changeImage(1)">&#10095;</span>
</div>

<script>
let currentIndex = 0;
const images = Array.from(document.querySelectorAll('.gallery img'));

function openModal(src) {
  const modal = document.getElementById('modal');
  const img = document.getElementById('modal-img');

  currentIndex = images.findIndex(i => i.src.includes(src.split('/').pop()));
  img.src = src;

  modal.classList.add('active');
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('active');
}
  
function changeImage(direction) {
  currentIndex += direction;

  if (currentIndex < 0) currentIndex = images.length - 1;
  if (currentIndex >= images.length) currentIndex = 0;

  const newSrc = images[currentIndex].getAttribute('onclick')
    .match(/'([^']+)'/)[1];

  document.getElementById('modal-img').src = newSrc;
}

// Close when clicking background
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target.id === 'modal') closeModal();
});

// Keyboard support
document.addEventListener('keydown', function(e) {
  if (e.key === "Escape") closeModal();
  if (e.key === "ArrowRight") changeImage(1);
  if (e.key === "ArrowLeft") changeImage(-1);
});

window.addEventListener('DOMContentLoaded', function() {
  document.body.classList.remove('fade-start');
  document.body.classList.add('fade-in');
});
</script>

<footer>
  <p>© 2026 Masao Honda. All rights reserved.</p>
</footer>
</body>
</html>
